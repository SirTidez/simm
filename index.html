<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Schedule I Developer Environment Manager</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        background-color: #1a1a1a;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        color: rgba(255, 255, 255, 0.87);
      }

      .boot-screen {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px;
      }

      .boot-card {
        width: min(480px, 90vw);
        background-color: #2a2a2a;
        border: 1px solid #3a3a3a;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        padding: 32px 32px 28px;
        display: grid;
        gap: 16px;
        text-align: center;
        backdrop-filter: blur(12px);
      }

      .boot-title {
        font-size: 20px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .boot-subtitle {
        font-size: 14px;
        font-weight: 400;
        color: #cccccc;
      }

      .boot-loader {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }

      .boot-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #646cff;
        animation: bounce 1s ease-in-out infinite;
      }

      .boot-dot:nth-child(2) {
        animation-delay: 0.15s;
      }

      .boot-dot:nth-child(3) {
        animation-delay: 0.3s;
      }

      .boot-bar {
        height: 6px;
        border-radius: 4px;
        background-color: #3a3a3a;
        overflow: hidden;
        position: relative;
      }

      .boot-bar::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, rgba(100, 108, 255, 0.2), #646cff, rgba(100, 108, 255, 0.2));
        animation: slide 1.6s ease-in-out infinite;
      }

      @keyframes bounce {
        0%,
        100% {
          transform: translateY(0);
          opacity: 0.5;
        }
        50% {
          transform: translateY(-6px);
          opacity: 1;
        }
      }

      @keyframes slide {
        0% {
          transform: translateX(-65%);
        }
        50% {
          transform: translateX(0);
        }
        100% {
          transform: translateX(65%);
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="boot-screen" role="status" aria-live="polite">
        <div class="boot-card">
          <div class="boot-title">Schedule I</div>
          <div class="boot-subtitle">Preparing the dev environment</div>
          <div class="boot-loader" aria-hidden="true">
            <span class="boot-dot"></span>
            <span class="boot-dot"></span>
            <span class="boot-dot"></span>
          </div>
          <div class="boot-bar"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
