name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-tauri-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-maxtimeout 120000
          npm ci --no-audit --prefer-offline

      - name: Build Windows installer
        run: npm run tauri build -- --bundles nsis

      - name: Inspect build outputs
        shell: pwsh
        run: |
          Write-Host "Listing target/release contents"
          if (Test-Path "target/release") {
            Get-ChildItem -Path "target/release" -Recurse | Select-Object FullName
          } else {
            Write-Host "target/release does not exist"
          }

      - name: Upload standalone executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable-exe
          path: target/release/*.exe
          if-no-files-found: error
          retention-days: 14

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-setup-exe
          path: target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 14
