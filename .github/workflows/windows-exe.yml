name: Build Setup Wizard

on:
  workflow_dispatch:

jobs:
  build-setup-wizard:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-maxtimeout 120000
          npm install --no-audit --prefer-offline

      - name: Build Windows setup wizard
        run: npm run tauri build -- --bundles nsis

      - name: Resolve build version
        id: version
        shell: pwsh
        run: |
          $version = ''

          if ($env:GITHUB_REF_TYPE -eq 'tag' -and $env:GITHUB_REF_NAME.StartsWith('v')) {
            $version = $env:GITHUB_REF_NAME.Substring(1)
          }

          if (-not $version) {
            $config = Get-Content 'src-tauri/tauri.conf.json' -Raw | ConvertFrom-Json
            $version = $config.version
          }

          if (-not $version) {
            throw 'Unable to determine build version.'
          }

          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Resolved version: $version"

      - name: Inspect build outputs
        shell: pwsh
        run: |
          Write-Host "Listing target/release contents"
          if (Test-Path 'target/release') {
            Get-ChildItem -Path 'target/release' -Recurse | Select-Object FullName
          } else {
            Write-Host 'target/release does not exist'
          }

      - name: Prepare setup wizard artifact
        id: renamed
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.version }}'
          New-Item -ItemType Directory -Path 'artifacts' -Force | Out-Null

          $setupSource = Get-ChildItem -Path 'target/release/bundle/nsis' -File -Filter '*.exe' | Select-Object -First 1
          if (-not $setupSource) {
            throw 'Setup executable not found in target/release/bundle/nsis.'
          }

          $setupTarget = "artifacts/SIMM_${version}_Setup.exe"

          Copy-Item -LiteralPath $setupSource.FullName -Destination $setupTarget -Force

          "setup_file=$setupTarget" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Upload setup wizard artifact
        uses: actions/upload-artifact@v4
        with:
          name: SIMM_${{ steps.version.outputs.version }}_Setup
          path: ${{ steps.renamed.outputs.setup_file }}
          if-no-files-found: error
          retention-days: 14
